name: Verify

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

            - name: Check formatting
              run: npm run format:check

            - name: Run tests
              run: npm run test

            - name: Run typecheck
              run: npm run typecheck

            - name: Check Supabase schema parity
              run: npm run check:supabase-schema
